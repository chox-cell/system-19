name: System-19 PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Run System-19
        id: system19
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          test-status: unknown
          comment-mode: pr-comment

      - name: Upload System-19 artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-19-audit
          path: ${{ steps.system19.outputs.artifact-path }}
