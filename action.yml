inputs:
  github-token:
    description: "GitHub token"
    required: true
  test-status:
    description: "Optional test status: pass | fail | unknown"
    required: false
    default: "unknown"

runs:
  using: "node20"
  main: "dist/index.js"

branding:
  icon: "shield"
  color: "red"
