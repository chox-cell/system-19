name: "System-19"
description: "AI code enforcement layer for Pull Requests"
author: "System-19"

inputs:
  github-token:
    description: "GitHub token"
    required: true
  test-status:
    description: "Optional test status: pass | fail | unknown"
    required: false
    default: "unknown"
  comment-mode:
    description: "pr-comment | log-only"
    required: false
    default: "pr-comment"

outputs:
  artifact-path:
    description: "Path to the generated System-19 audit artifact"

runs:
  using: "node20"
  main: "dist/index.js"

branding:
  icon: "shield"
  color: "red"
